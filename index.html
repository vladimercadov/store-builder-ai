<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Builder AI</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0EA5E9">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <style>
    body {
      margin: 0;
      background-color: #0B1326; /* Azul Noche Industrial  */
      color: #F8FAFC; /* Blanco Humo  */
      font-family: 'Inter', sans-serif; /* Tipografía oficial  */
      height: 100vh;
      overflow: hidden;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(14, 165, 233, 0.1);
      border-left-color: #0EA5E9; /* Azul Técnico  */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Iniciando Store Builder AI...</p>
    </div>
  </div>

  <script type="module" src="/src/main.tsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((reg) => console.log('Store Builder AI: Listo para uso offline.', reg))
          .catch((err) => console.error('Error al registrar Service Worker:', err));
      });
    }
  </script>
</body>
</html>
